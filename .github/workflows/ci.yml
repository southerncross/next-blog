name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

      - name: Build
        env:
          # Build does not need real values, but Next reads these at build time
          # for any code paths that reference them. Empty strings are fine for
          # static generation in this repo.
          AUTH0_SECRET: ci-placeholder-secret-ci-placeholder-secret
          AUTH0_BASE_URL: http://localhost:3000
          AUTH0_ISSUER_BASE_URL: https://example.auth0.com
          AUTH0_CLIENT_ID: ci-placeholder
          AUTH0_CLIENT_SECRET: ci-placeholder
          # Postgres calls in src/lib/{data,actions}.ts are wrapped in try/catch.
          # A placeholder URL silences the @vercel/postgres "missing_connection_string"
          # error during static prerender without changing build output.
          POSTGRES_URL: postgres://ci:ci@localhost:5432/ci
        run: pnpm build
